<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#logoGradient)" stroke-width="2" filter="url(#shadow)"/>

  <!-- Left fusion element (Blue) -->
  <g opacity="0.95">
    <path d="M 60 80 Q 70 60 85 70 Q 90 95 80 110 Q 65 105 60 85 Z" fill="#1a56db"/>
    <circle cx="75" cy="85" r="8" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Right fusion element (Purple) -->
  <g opacity="0.95">
    <path d="M 140 80 Q 130 60 115 70 Q 110 95 120 110 Q 135 105 140 85 Z" fill="#7c3aed"/>
    <circle cx="125" cy="85" r="8" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Center fusion point -->
  <circle cx="100" cy="95" r="12" fill="url(#logoGradient)"/>
  <circle cx="100" cy="95" r="7" fill="#ffffff" opacity="0.3"/>

  <!-- Top accent -->
  <path d="M 100 45 L 105 55 L 95 55 Z" fill="url(#logoGradient)"/>

  <!-- Connecting lines for tech feel -->
  <line x1="75" y1="85" x2="100" y2="95" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="125" y1="85" x2="100" y2="95" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom curve accent -->
  <path d="M 70 130 Q 100 145 130 130" stroke="url(#logoGradient)" stroke-width="2" fill="none" opacity="0.7"/>
</svg>
